# GitLab CI pour Mission Résistance (app)
#
# Une seule étape : versioning automatique sur push `main`.
# Le build & publish (Android/iOS) est géré par GitHub Actions (sur le miroir
# GitHub), déclenché par le tag `v*` que cette étape pousse.
#
# Flow complet :
#   1. Dev pousse des commits conventionnels sur main (feat:, fix:, ...)
#   2. semantic-release lit les commits depuis le dernier tag
#   3. Bump `version:` dans pubspec.yaml + commit `chore(release): X.Y.Z`
#   4. Crée et pousse le tag `vX.Y.Z`
#   5. GitLab miroir le tag vers GitHub → GitHub Actions détecte le tag et
#      lance le workflow de build/release (cf. .github/workflows/release.yml)
#
# Note : on n'utilise PAS `[skip ci]` dans le message de release. GitHub Actions
# interprète ce marqueur sur le tag mirroré et skip notre workflow côté GitHub.
# À la place, on casse la boucle GitLab via une `rules:` qui ignore les commits
# dont le titre commence par `chore(release)`.
#
# Pré-requis GitLab :
#   - Variable CI/CD `GITLAB_TOKEN` : Project Access Token avec scope
#     `write_repository` et rôle `Maintainer` (Settings → Access Tokens).
#   - Si la branche `main` est protégée : ajouter le bot/token aux
#     utilisateurs autorisés à push + autoriser le push de tags `v*`
#     (Settings → Repository → Protected branches / Protected tags).
#   - Miroir push vers GitHub activé, tags inclus (Settings → Repository →
#     Mirroring repositories), pour que le tag `v*` déclenche les Actions.

variables:
  GITHUB_MIRROR_URL: "https://github.com/ton-user/mission-resistance.git"

stages:
  - release

semantic-release:
  stage: release
  image: node:22
  variables:
    # `clone` + depth 0 : semantic-release a besoin de tout l'historique
    # et de tous les tags pour calculer le prochain numéro de version.
    GIT_STRATEGY: clone
    GIT_DEPTH: 0
  before_script:
    - npm ci --cache .npm --prefer-offline
    - git config --global user.name "GitLab CI Bot"
    - git config --global user.email "ci@gitlab.com"
    # On réécrit l'origine avec le token pour pouvoir push commit + tag.
    - git remote set-url origin "https://oauth2:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - git fetch --tags
  script:
    - npx semantic-release
  rules:
    # Garde anti-boucle : le commit de release que ce job produit a pour
    # titre `chore(release): X.Y.Z`. Sans cette règle on bouclerait à
    # l'infini (le push du commit re-déclenche le job, qui repousse, etc.).
    # Remplace `[skip ci]` dans le message — voir l'en-tête du fichier.
    - if: '$CI_COMMIT_TITLE =~ /^chore\(release\)/'
      when: never
    # Uniquement sur push direct main (pas sur MR, pas sur tag).
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'

mirror-to-github:
  stage: .post
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: 0
  before_script:
    - git remote add github "https://oauth2:${GITHUB_TOKEN}@${GITHUB_MIRROR_URL#https://}"
  script:
    - git push --force github "refs/remotes/origin/*:refs/heads/*"
    - git push --force --tags github
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_COMMIT_TAG'
