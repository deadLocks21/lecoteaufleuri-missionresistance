# Workflow de release Mission Résistance, déclenché sur push d'un tag `v*`.
#
# Le tag est poussé par la CI GitLab (semantic-release, cf. .gitlab-ci.yml) puis
# mirroré vers GitHub, ce qui déclenche ce workflow.
#
# Pipeline "fail-fast au build, atomique à la publish/release" :
#
#   1) prepare         Calcule la version (depuis le tag ou pubspec.yaml).
#   2) build-android   AAB + APK universel signés (artifacts, pas encore publiés).
#      build-ios       .ipa signé App Store (artifact, pas encore publié).
#   3) build-gate      Sentinelle : vérifie que les builds d'app sont verts.
#   4) publish-android Upload sur le Play Store, piste "internal".
#      publish-ios     Upload sur TestFlight (les testeurs internes reçoivent
#                      le build automatiquement).
#   5) release         Crée la GitHub Release avec l'AAB + l'APK + l'IPA.
#
# CIBLES : Android + iOS uniquement (pas de desktop/web).
#
# Secrets requis (Settings → Secrets and variables → Actions → Secrets) :
#   ANDROID_KEYSTORE_BASE64        keystore upload (.jks) encodé base64
#   ANDROID_KEYSTORE_PASSWORD      mot de passe du keystore
#   ANDROID_KEY_ALIAS              alias de la clé
#   ANDROID_KEY_PASSWORD           mot de passe de la clé
#   GCLOUD_SERVICE_ACCOUNT_CREDENTIALS  JSON du compte de service Google Play
#   APP_STORE_CONNECT_KEY_IDENTIFIER     Key ID de la clé API App Store Connect
#   APP_STORE_CONNECT_ISSUER_ID          Issuer ID du compte App Store Connect
#   APP_STORE_CONNECT_PRIVATE_KEY        contenu du .p8 de la clé API
#   CERTIFICATE_PRIVATE_KEY              clé privée du cert Apple Distribution
#
# Secrets optionnels (télémétrie Signoz — sans eux, l'app journalise en console
# seulement, sans expédier vers Signoz) :
#   SIGNOZ_INGEST_URL              endpoint OTLP HTTP, ex.
#                                  https://ingest.eu.signoz.cloud:443/v1/logs
#   SIGNOZ_INGESTION_KEY           clé d'ingestion Signoz Cloud (signoz-access-token)
#
# Variable requise (Settings → Secrets and variables → Actions → Variables) :
#   APP_STORE_APPLE_ID             Apple ID numérique de l'app sur App Store
#                                  Connect (nécessaire au calcul du build number iOS)
#
# Pré-requis Play Console : l'app `com.lecoteaufleuri.missionresistance` doit
# exister dans la console et un premier AAB peut devoir être uploadé manuellement
# avant que l'API accepte les publications automatiques sur la piste internal.
# Pré-requis App Store Connect : app Mission Résistance (bundle
# `com.lecoteaufleuri.missionresistance`, plateforme iOS) créée + groupe
# TestFlight interne. Le provisioning profile App Store est généré
# automatiquement au premier build par `fetch-signing-files --create`.
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Compute version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.build-number.outputs.build_number }}
    env:
      ANDROID_PACKAGE_NAME: "com.lecoteaufleuri.missionresistance"
      GCLOUD_SERVICE_ACCOUNT_CREDENTIALS: ${{ secrets.GCLOUD_SERVICE_ACCOUNT_CREDENTIALS }}
      APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
      APP_STORE_APPLE_ID: ${{ vars.APP_STORE_APPLE_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Extrait la version depuis le tag (ou pubspec.yaml)
        # Tag `v1.2.3` → 1.2.3. Pour `workflow_dispatch` (lancement manuel
        # sans tag), on retombe sur la version de `pubspec.yaml`.
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: *//;s/+.*//')
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Setup Python (requis par codemagic-cli-tools)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install codemagic-cli-tools
        run: pip install codemagic-cli-tools

      - name: Compute shared build number (max des deux stores + 1)
        # Un SEUL build number pour Android et iOS, calculé ici et propagé aux
        # deux jobs build via l'output `build_number`. On prend le max des deux
        # stores +1 : ça garantit un numéro identique, strictement croissant des
        # deux côtés, et ça rattrape tout écart existant entre Play et App Store.
        id: build-number
        run: |
          ANDROID_BUILD=$(google-play get-latest-build-number \
            --package-name "$ANDROID_PACKAGE_NAME" \
            --credentials "@env:GCLOUD_SERVICE_ACCOUNT_CREDENTIALS" \
            --tracks production beta alpha internal 2>/dev/null || echo 0)
          IOS_BUILD=$(app-store-connect get-latest-build-number \
            "$APP_STORE_APPLE_ID" \
            --platform IOS 2>/dev/null || echo 0)
          ANDROID_BUILD=${ANDROID_BUILD:-0}
          IOS_BUILD=${IOS_BUILD:-0}
          MAX_BUILD=$(( ANDROID_BUILD > IOS_BUILD ? ANDROID_BUILD : IOS_BUILD ))
          BUILD_NUMBER=$(( MAX_BUILD + 1 ))
          echo "Android latest: $ANDROID_BUILD | iOS latest: $IOS_BUILD"
          echo "Shared next build number: $BUILD_NUMBER"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

  # ═══════════════════════════════════════════════════════════════════════
  # BUILD ANDROID — Compilation + signature + upload artifact (pas de publish)
  # ═══════════════════════════════════════════════════════════════════════

  build-android:
    name: Build Android (${{ needs.prepare.outputs.version }})
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PACKAGE_NAME: "com.lecoteaufleuri.missionresistance"
      GCLOUD_SERVICE_ACCOUNT_CREDENTIALS: ${{ secrets.GCLOUD_SERVICE_ACCOUNT_CREDENTIALS }}
      VERSION: ${{ needs.prepare.outputs.version }}
      BUILD_NUMBER: ${{ needs.prepare.outputs.build_number }}
      # URL du backend injectée au build (cf. infrastructure/http/api_config.dart).
      # VIDE → l'app sert le jumeau de démo (InMemory*), aucun appel réseau.
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      # Télémétrie Signoz injectée au build via --dart-define (cf.
      # infrastructure/telemetry/telemetry_providers.dart). Sans
      # SIGNOZ_INGEST_URL, l'app retombe sur le logger console (Signoz off).
      SIGNOZ_INGEST_URL: ${{ secrets.SIGNOZ_INGEST_URL }}
      SIGNOZ_INGESTION_KEY: ${{ secrets.SIGNOZ_INGESTION_KEY }}
      SIGNOZ_ENV: "production"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java (Temurin 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          channel: stable
          cache: true

      - name: Setup Python (requis par codemagic-cli-tools)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install codemagic-cli-tools
        run: pip install codemagic-cli-tools

      - name: Décoder le keystore upload
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > "$GITHUB_WORKSPACE/android/upload-keystore.jks"

      - name: Écrire android/key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          cat > "$GITHUB_WORKSPACE/android/key.properties" <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=$GITHUB_WORKSPACE/android/upload-keystore.jks
          EOF

      - run: flutter pub get

      - name: Build App Bundle (.aab)
        run: |
          flutter build appbundle --release \
            --build-name="$VERSION" \
            --build-number="$BUILD_NUMBER" \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=APP_VERSION="$VERSION+$BUILD_NUMBER" \
            --dart-define=SIGNOZ_INGEST_URL="$SIGNOZ_INGEST_URL" \
            --dart-define=SIGNOZ_INGESTION_KEY="$SIGNOZ_INGESTION_KEY" \
            --dart-define=SIGNOZ_ENV="$SIGNOZ_ENV"

      - name: Build APK (.apk)
        # APK universel attaché à la GitHub Release pour install directe /
        # sideload. Le Play Store reçoit l'AAB (cf. job publish-android) ;
        # l'APK ne sert qu'à la distribution hors store.
        run: |
          flutter build apk --release \
            --build-name="$VERSION" \
            --build-number="$BUILD_NUMBER" \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=APP_VERSION="$VERSION+$BUILD_NUMBER" \
            --dart-define=SIGNOZ_INGEST_URL="$SIGNOZ_INGEST_URL" \
            --dart-define=SIGNOZ_INGESTION_KEY="$SIGNOZ_INGESTION_KEY" \
            --dart-define=SIGNOZ_ENV="$SIGNOZ_ENV"

      - name: Upload AAB + APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mission-resistance-android
          path: |
            build/app/outputs/bundle/release/*.aab
            build/app/outputs/flutter-apk/*.apk
          retention-days: 14
          if-no-files-found: error

  # ═══════════════════════════════════════════════════════════════════════
  # BUILD iOS — Compilation + signature + packaging .ipa (pas de publish)
  # ═══════════════════════════════════════════════════════════════════════

  build-ios:
    name: Build iOS (${{ needs.prepare.outputs.version }})
    needs: prepare
    runs-on: macos-15
    timeout-minutes: 60

    env:
      APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
      CERTIFICATE_PRIVATE_KEY: ${{ secrets.CERTIFICATE_PRIVATE_KEY }}
      BUNDLE_ID: "com.lecoteaufleuri.missionresistance"
      APP_STORE_APPLE_ID: ${{ vars.APP_STORE_APPLE_ID }}
      VERSION: ${{ needs.prepare.outputs.version }}
      BUILD_NUMBER: ${{ needs.prepare.outputs.build_number }}
      # URL du backend injectée au build (cf. job Android). VIDE → jumeau démo.
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      # Télémétrie Signoz injectée au build via --dart-define (cf. job Android).
      SIGNOZ_INGEST_URL: ${{ secrets.SIGNOZ_INGEST_URL }}
      SIGNOZ_INGESTION_KEY: ${{ secrets.SIGNOZ_INGESTION_KEY }}
      SIGNOZ_ENV: "production"

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.3 (iOS 26 SDK)
        # Apple exige le SDK iOS 26+ (Xcode 26+) pour tout upload sur
        # App Store Connect. Sans ça, le runner macos-15 utilise Xcode 16.x
        # (SDK iOS 18.5) et la publication échoue en validation (409).
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer
          xcodebuild -version

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          channel: stable
          cache: true

      - name: Setup Python (requis par codemagic-cli-tools)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install codemagic-cli-tools
        run: pip install codemagic-cli-tools

      - name: Initialize keychain
        run: keychain initialize

      - name: Fetch iOS App Store signing files (create if missing)
        run: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create

      - name: Add Apple Distribution certificate to keychain
        run: keychain add-certificates

      - name: Set up code signing on iOS Xcode project
        # Applique les provisioning profiles au projet et génère
        # ~/export_options.plist consommé par `flutter build ipa`.
        run: xcode-project use-profiles

      - run: flutter pub get

      - name: Cache CocoaPods (iOS)
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: pods-ios-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-ios-${{ runner.os }}-

      - name: Install CocoaPods dependencies (iOS)
        run: |
          cd ios
          pod install

      - name: Build IPA
        run: |
          flutter build ipa --release \
            --build-name="$VERSION" \
            --build-number="$BUILD_NUMBER" \
            --export-options-plist="$HOME/export_options.plist" \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=APP_VERSION="$VERSION+$BUILD_NUMBER" \
            --dart-define=SIGNOZ_INGEST_URL="$SIGNOZ_INGEST_URL" \
            --dart-define=SIGNOZ_INGESTION_KEY="$SIGNOZ_INGESTION_KEY" \
            --dart-define=SIGNOZ_ENV="$SIGNOZ_ENV"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: mission-resistance-ios
          path: build/ios/ipa/*.ipa
          retention-days: 14
          if-no-files-found: error

  # ═══════════════════════════════════════════════════════════════════════
  # BUILD GATE — Sentinelle qui valide que les builds sont verts
  # ═══════════════════════════════════════════════════════════════════════

  build-gate:
    name: All builds passed
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - run: echo "✓ All platform builds succeeded — proceeding to store uploads"

  # ═══════════════════════════════════════════════════════════════════════
  # PUBLISH — Upload store (déclenché après build-gate uniquement)
  # ═══════════════════════════════════════════════════════════════════════

  publish-android:
    name: Publish Android to Play Store
    needs: [prepare, build-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      GCLOUD_SERVICE_ACCOUNT_CREDENTIALS: ${{ secrets.GCLOUD_SERVICE_ACCOUNT_CREDENTIALS }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python (requis par codemagic-cli-tools)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install codemagic-cli-tools
        run: pip install codemagic-cli-tools

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: mission-resistance-android
          path: artifacts/

      - name: Publish to Play Store (internal track)
        run: |
          AAB_PATH=$(find artifacts -type f -name '*.aab' | head -1)
          echo "Uploading: $AAB_PATH"
          google-play bundles publish \
            --credentials "@env:GCLOUD_SERVICE_ACCOUNT_CREDENTIALS" \
            --bundle "$AAB_PATH" \
            --track internal \
            --release-notes "@file:release_notes_android.json"

  publish-ios:
    name: Publish iOS to TestFlight
    needs: [prepare, build-gate]
    runs-on: macos-15
    timeout-minutes: 120

    env:
      APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
      APP_STORE_CONNECT_MAX_FIND_BUILD_WAIT: "90"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python (requis par codemagic-cli-tools)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install codemagic-cli-tools
        run: pip install codemagic-cli-tools

      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: mission-resistance-ios
          path: artifacts/

      - name: Publish to TestFlight (internal testers only, iOS)
        run: |
          WHATS_NEW=$(jq -r '.[] | select(.language=="fr-FR") | .text' release_notes.json)
          IPA_PATH=$(find artifacts -type f -name '*.ipa' | head -1)
          echo "Uploading: $IPA_PATH"
          # Test INTERNE uniquement : on ne passe NI `--testflight` NI
          # `--beta-group`.
          #   - `--testflight` soumettrait le build à la beta app review Apple
          #     (= test EXTERNE), qui exige les infos « Test Information »
          #     (Feedback Email, Beta App Review Information). Inutile et
          #     bloquant pour de l'interne.
          #   - `--beta-group` ne sert qu'aux groupes externes ; l'API refuse
          #     d'y assigner un groupe interne.
          # Les testeurs internes (rôles App Store Connect) reçoivent
          # automatiquement tout build une fois traité par Apple. On se contente
          # donc d'uploader et de renseigner le « What to Test » (`--whats-new`),
          # visible aussi côté interne.
          app-store-connect publish \
            --path "$IPA_PATH" \
            --locale fr-FR \
            --whats-new "$WHATS_NEW" \
            --max-find-build-wait 90

  # ═══════════════════════════════════════════════════════════════════════
  # GITHUB RELEASE — AAB + APK + IPA attachés, après publishes verts
  # ═══════════════════════════════════════════════════════════════════════

  release:
    name: Create GitHub Release
    needs: [prepare, publish-android, publish-ios]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        run: |
          BODY=$(jq -r '.[] | select(.language=="fr-FR") | .text' release_notes.json)

          ASSETS=()
          echo "Releasing assets:"
          while IFS= read -r f; do
            [ -n "$f" ] || continue
            echo "  - $f"
            ASSETS+=("$f")
          done < <(find artifacts -type f \( \
            -name '*.aab' -o -name '*.apk' -o -name '*.ipa' \
            \) | sort)

          if [ ${#ASSETS[@]} -eq 0 ]; then
            echo "ERROR: no release assets found"
            exit 1
          fi

          # Tag name : `v<version>` si on est sur un tag, sinon nom synthétique
          # avec run_number pour éviter toute collision avec un tag git existant
          # (cas workflow_dispatch, pour tester le pipeline sans tagger).
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            RELEASE_TAG="$GITHUB_REF_NAME"
          else
            RELEASE_TAG="dispatch-v${VERSION}-${{ github.run_number }}"
          fi
          echo "Release tag: $RELEASE_TAG"

          gh release create "$RELEASE_TAG" \
            --title "Mission Résistance v$VERSION" \
            --notes "$BODY" \
            "${ASSETS[@]}"
